name: Publish SDK packages

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Registry release channel
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - stable
      confirmation:
        description: Type PUBLISH ALPHA SDK or PUBLISH STABLE SDK
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sdk-registry-release
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build SDK packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"

      - name: Enforce release channel and evidence boundary
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          node_version="$(node -p "require('./node/package.json').version")"
          python_version="$(python -c "import pathlib,tomllib; print(tomllib.loads(pathlib.Path('python/pyproject.toml').read_text())['project']['version'])")"
          case "$RELEASE_CHANNEL" in
            alpha)
              [ "$CONFIRMATION" = "PUBLISH ALPHA SDK" ]
              [[ "$node_version" =~ ^0\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]
              [[ "$python_version" =~ ^0\.[0-9]+\.[0-9]+a[0-9]+$ ]]
              ;;
            stable)
              [ "$CONFIRMATION" = "PUBLISH STABLE SDK" ]
              [[ "$node_version" =~ ^[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]
              [ "$python_version" = "$node_version" ]
              node scripts/validate-stable-handoff.mjs
              ;;
            *)
              echo "Unsupported release channel: $RELEASE_CHANNEL"
              exit 1
              ;;
          esac

      - name: Validate Node SDK
        working-directory: node
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm test

      - name: Validate Python SDK
        run: |
          python -m pip install --disable-pip-version-check build==1.5.0 httpx==0.28.1
          PYTHONPATH=python python -m unittest discover -s python/tests

      - name: Test stable handoff validator
        run: node --test scripts/validate-stable-handoff.test.mjs

      - name: Build packages
        shell: bash
        run: |
          mkdir -p dist/npm dist/pypi
          cd node
          npm pack --pack-destination "$GITHUB_WORKSPACE/dist/npm"
          cd "$GITHUB_WORKSPACE"
          python -m build --outdir dist/pypi python

      - name: Upload npm artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: npm-package
          path: dist/npm/*.tgz
          if-no-files-found: error
          retention-days: 30

      - name: Upload PyPI artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pypi-packages
          path: dist/pypi/*
          if-no-files-found: error
          retention-days: 30

  publish-npm:
    name: Publish npm with OIDC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install OIDC-capable npm
        run: npm install --global npm@12.0.1

      - name: Download npm artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: npm-package
          path: dist/npm

      - name: Publish npm package
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          if [ "$RELEASE_CHANNEL" = "alpha" ]; then
            npm publish dist/npm/*.tgz --access public --tag alpha
          else
            npm publish dist/npm/*.tgz --access public
          fi

  publish-pypi:
    name: Publish PyPI with OIDC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: pypi-packages
          path: dist/pypi

      - name: Publish PyPI package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/pypi/
