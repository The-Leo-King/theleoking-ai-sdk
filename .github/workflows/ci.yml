name: SDK CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: sdk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install, test, and inspect package
        working-directory: node
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm test
          npm pack --dry-run --json

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"

      - name: Test and build package
        run: |
          python -m pip install --disable-pip-version-check build==1.5.0 httpx==0.28.1
          PYTHONPATH=python python -m unittest discover -s python/tests
          python -m build --outdir python/dist python
